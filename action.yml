name: 'NetOfficeFw/nuget-login'
description: 'Authenticate to NuGet.org from GitHub actions using OIDC and get a short-lived API key.'

inputs:
  user:
    description: 'NuGet username'
    required: true
  token-service-url:
    description: 'Token exchange endpoint URL'
    required: false
    default: 'https://www.nuget.org/api/v2/token'
  audience:
    description: 'OIDC audience to request'
    required: false
    default: 'https://www.nuget.org'

outputs:
  NUGET_API_KEY:
    description: 'Short-lived NuGet API key'

runs:
  using: 'node24'
  main: 'dist/index.js'
